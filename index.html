<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Project Collection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 3em;
            color: #2c3e50;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .header p {
            font-size: 1.3em;
            color: #7f8c8d;
            font-weight: 300;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .info-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
        }

        .info-card h2 {
            color: #34495e;
            font-size: 1.8em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .info-card h2::before {
            content: '📁';
            margin-right: 10px;
            font-size: 1.5em;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #3498db;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .info-icon {
            font-size: 1.5em;
            margin-right: 15px;
            width: 40px;
            text-align: center;
        }

        .info-text h3 {
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .info-text p {
            color: #7f8c8d;
            font-size: 1.1em;
        }

        .contact-section {
            text-align: center;
            margin-top: 40px;
        }

        .contact-btn {
            display: inline-block;
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.2em;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(52, 152, 219, 0.3);
        }

        .contact-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(52, 152, 219, 0.4);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.2em;
            }
            
            .container {
                padding: 10px;
            }
            
            .info-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Portfolio Saya</h1>
            <p>Kumpulan Project dan Karya Terbaik</p>
        </div>

        <div class="info-card">
            <h2>Informasi Project</h2>
            <div class="info-item">
                <div class="info-icon">👤</div>
                <div class="info-text">
                    <h3>Nama</h3>
                    <p>MOHAMAD FIKRI JAMALUDIN</p>
                </div>
            </div>
            <div class="info-item">
                <div class="info-icon">📍</div>
                <div class="info-text">
                    <h3>Tempat Pengumpulan Project</h3>
                    <p>
                        GitHub: <a href="https://github.com/priamesterius-bit" target="_blank">github.com/priamesterius-bit</a><br>
                    </p>
                </div>
            </div>
            <div class="info-item">
                <div class="info-icon">📧</div>
                <div class="info-text">
                    <h3>Kontak</h3>
                    <p>alamsyahjamaludin1@gmail.com | +62 882-0037-83757</p>
                </div>
            </div>
        </div>

        <div class="contact-section">
            <a href="mailto:email@contoh.com" class="contact-btn">Hubungi Saya</a>
        </div>
    </div>
</body>
</html>
